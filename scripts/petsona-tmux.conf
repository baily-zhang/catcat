# Source from tmux:
#   source-file /path/to/catcat/scripts/petsona-tmux.conf

bind-key P command-prompt -p "77 message:" "run-shell 'petsona-say --source tmux --level info %%'"
bind-key C-p run-shell 'petsona-say --source tmux --level success --title "tmux" "Pane #{session_name}:#{window_index}.#{pane_index} is ready"'
bind-key C-e run-shell 'petsona-say --source tmux --level error --title "tmux needs attention" "Check pane #{session_name}:#{window_index}.#{pane_index}"'
